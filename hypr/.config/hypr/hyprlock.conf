label {
    monitor =
    text = cmd[] echo -e ""
    color = rgba(216, 222, 233, 0.90)
    font_size = 25
    font_family = Noto Sans
    position = 0, -500
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 650, 100
    position = 0, -600
    halign = center
    valign = center

    inner_color = rgba(216, 222, 233, 0.2) #$inner_color
    outer_color = $outer_color
    outline_thickness = 4 #4

    font_size = 25
    font_family = SF Pro Text
    font_family = .SF NS Rounded
    font_color = rgba(216, 222, 233, 0.90) #$font_color

    placeholder_text = <span> Enter Password 󰈷 </span>
    placeholder_text = $FPRINTPROMPT 
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = -1
    shadow_passes = 0
    fade_on_empty = true
}

auth {
    fingerprint:enabled = true
}
