# Mac-like bindings
bindd = SUPER, Q, Close window, killactive
bindd = CONTROL_L, BACKSPACE, Delete forward, sendshortcut, , Delete, activewindow
bindd = CONTROL, 3, Mac GB layout hash key, sendshortcut, MOD5, 3, activewindow

unbind = SUPER, W
bindd = SUPER, W, Close window or browser tab, exec, ~/.config/hypr/bin/app-specific-bindings
bindd = SUPER, M, Minimise, movetoworkspacesilent, special:minimize

unbind = SUPER, T
bindd = SUPER, T, Toggle window tiling / New browser tab, exec, ~/.config/hypr/bin/app-specific-bindings CTRL,T "dispatch togglefloating"

unbind = SUPER CONTROL, N
bindd = SUPER CONTROL, N, Toggle nightlight, exec, ~/.config/hypr/bin/custom-toggle-nightlight

bindd = SUPER, Z, Unclose browser tab, exec, ~/.config/hypr/bin/app-specific-bindings "CTRL SHIFT,T" clients

bindd = SUPER SHIFT, T, Toggle window floating/tiling, togglefloating

unbind = SUPER, L
#bindd = SUPER, L, Toggle workspace layout, exec, ~/.config/hypr/bin/app-specific-bindings CTRL,L "dispatch exec omarchy-hyprland-workspace-layout-toggle"
#bindd = SUPER, L, Toggle workspace layout, exec, ~/.config/hypr/bin/app-specific-bindings CTRL,L "dispatch exec ~/.config/hypr/bin/omarchy-hyprland-workspace-layout-toggle-extended"
bindd = SUPER, L, Select address bar in browser, sendshortcut, CTRL, L, activewindow

bindd = SUPER, R, Refresh current tab, sendshortcut, CTRL, R, activewindow

gesture = 3, left, dispatcher, sendshortcut, alt, left, activewindow
gesture = 3, right, dispatcher, sendshortcut, alt, right, activewindow
gesture = 4, right, dispatcher, workspace, e-1
gesture = 4, left, dispatcher, workspace, e+1
gesture = 4, pinchout, dispatcher, exec, omarchy-launch-walker

bindd = Alt_R, bracketleft, Next tab, sendshortcut, CTRL&SHIFT, TAB, activewindow
bindd = Alt_R, bracketright, Previous tab, sendshortcut, CTRL, TAB, activewindow

unbind = SUPER, F
bindd = SUPER, F, Full width, fullscreen, 1
unbind = SUPER ALT, F
bindd = SUPER ALT, F, Full screen, fullscreen, 0
#unbind = SUPER SHIFT, BACKSPACE
#bindd = SUPER SHIFT, BACKSPACE, Toggle window gaps, exec, sh -c "omarchy-hyprland-window-gaps-toggle; omarchy-toggle-waybar"

unbind = SUPER SHIFT, M
bindd = SUPER SHIFT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
unbind = SUPER SHIFT ALT, M
bindd = SUPER SHIFT ALT, M, Music, exec, omarchy-launch-or-focus spotify

# Simpler window resizer, to match current macOS SKHD bindings
bindd = CONTROL_L ALT, LEFT, Shrink window left, resizeactive, -100 0
bindd = CONTROL_L ALT, RIGHT, Expand window left, resizeactive, 100 0
bindd = CONTROL_L ALT, UP, Shrink window up, resizeactive, 0 -100
bindd = CONTROL_L ALT, DOWN, Expand window down, resizeactive, 0 100

# Personal Omarchy bindings
# unbind = SUPER SHIFT, BACKSPACE
# bindd = SUPER SHIFT, BACKSPACE, Toggle workspace gaps, exec, ~/.config/hypr/bin/omarchy-hyprland-workspace-toggle-gaps-extended

bindd = SUPER CONTROL ALT, SPACE, Cycle through theme backgrounds, exec, omarchy-theme-bg-next

