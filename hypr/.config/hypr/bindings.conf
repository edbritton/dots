# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Mac-like bindings
bindd = SUPER, Q, Close window, killactive
bindd = CONTROL_L, BACKSPACE, Delete forward, sendshortcut, , Delete,
bindd = CONTROL, 3, Mac GB layout hash key, sendshortcut, MOD5, 3,

unbind = SUPER, W
bindd = SUPER, W, Close window or Chrome tab, exec, ~/.config/hypr/bin/app-specific-bindings

unbind = SUPER, T
bindd = SUPER, T, Toggle window tiling / New browser tab, exec, ~/.config/hypr/bin/app-specific-bindings CTRL,T "dispatch togglefloating"

bindd = SUPER, Z, Unclose browser tab, exec, ~/.config/hypr/bin/app-specific-bindings "CTRL SHIFT,T" clients

bindd = SUPER SHIFT, T, Toggle window floating/tiling, togglefloating

unbind = SUPER, L
#bindd = SUPER, L, Toggle workspace layout, exec, ~/.config/hypr/bin/app-specific-bindings CTRL,L "dispatch exec omarchy-hyprland-workspace-layout-toggle"
bindd = SUPER, L, Toggle workspace layout, exec, ~/.config/hypr/bin/app-specific-bindings CTRL,L "dispatch exec ~/.config/hypr/bin/omarchy-hyprland-workspace-layout-toggle-extended"
#bindd = SUPER, L, Select address bar in Chrome, sendshortcut, CTRL,L,

bindd = SUPER, R, Refresh current tab, sendshortcut, CTRL,R,

gesture = 3, left, dispatcher, sendshortcut, alt, left, activewindow
gesture = 3, right, dispatcher, sendshortcut, alt, right, activewindow
gesture = 4, right, dispatcher, workspace, e-1
gesture = 4, left, dispatcher, workspace, e+1

bindd = Alt_R, bracketleft, Next tab, sendshortcut, CTRL&SHIFT,TAB, activewindow
bindd = Alt_R, bracketright, Previous tab, sendshortcut, CTRL,TAB, activewindow

# Personal Omarchy bindings
unbind = SUPER SHIFT, BACKSPACE
bindd = SUPER SHIFT, BACKSPACE, Toggle workspace gaps, exec, ~/.config/hypr/bin/omarchy-hyprland-workspace-toggle-gaps-extended

bindd = SUPER CONTROL ALT, SPACE, Cycle through theme backgrounds, exec, omarchy-theme-bg-next

unbind = SUPER, 1
unbind = SUPER SHIFT, 1
bindd = SUPER, 1, Switch to browser workspace, workspace, name:Browsing
bindd = SUPER SHIFT, 1, Move window to browser workspace, movetoworkspace, name:Browsing

unbind = SUPER, 2
unbind = SUPER SHIFT, 2
bindd = SUPER, 2, Switch to Coding workspace, workspace, name:Coding
bindd = SUPER SHIFT, 2, Move window to Coding workspace, movetoworkspace, name:Coding

unbind = SUPER, 3
unbind = SUPER SHIFT, 3
bindd = SUPER, 3, Switch to Designing workspace, workspace, name:Designing
bindd = SUPER SHIFT, 3, Move window to Designing workspace, movetoworkspace, name:Designing

unbind = SUPER, 4
unbind = SUPER SHIFT, 4
bindd = SUPER, 4, Switch to Writing workspace, workspace, name:Writing
bindd = SUPER SHIFT, 4, Move window to Writing workspace, movetoworkspace, name:Writing
